<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="short icon" href="#">
    <title>강남새사람교회 스코어보드</title>
    <script defer src="../js/index.js" type="module"></script>
    <link href="../css/index.css" rel="stylesheet" />
</head>

<body class="medieval-theme">

    <div id="casino-layer" class="casino-overlay">
        <div class="casino-box">
            <div class="casino-title-text">🔮 주문 각성 룰렛 🔮</div>
            <div class="casino-num-display">
                <span id="user-live-score">0</span>점
            </div>
            <div style="color: #c5a880; font-size: 0.9rem;">운명의 주사위가 굴러갑니다...</div>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <h1 class="page-title" style="text-align: center; width: 100%; font-size: 3.2rem;">점수판</h1>
        </header>
        </br>
        <main id="user-scoreboard" class="scoreboard-container">
        </main>
        <div style="margin-top: 30px; width: 200px; margin-left: auto; margin-right: auto;">
            <button class="btn-broadcast" id="btn-roll-start" onclick="startCasinoRoulette()">
                🎰 주문 외우기
            </button>
        </div>
    </div>

    <audio id="sound-1" src="../sound/sound_jinyeom1.m4a" preload="auto"></audio>
    <audio id="sound-2" src="../sound/sound_jinyeom2.m4a" preload="auto"></audio>
    <audio id="sound-3" src="../sound/sound_jinyeom3.m4a" preload="auto"></audio>
    <audio id="sound-4" src="../sound/sound_jinyeom4.m4a" preload="auto"></audio>
    <audio id="sound-5" src="../sound/sound_jinyeom5.m4a" preload="auto"></audio>
    
    <script>
        // 페이지 로드 시 사용자 점수판 화면을 그립니다.
        window.addEventListener('DOMContentLoaded', () => {
            userscoreChange();
        });
    </script>
</body>
</html>
